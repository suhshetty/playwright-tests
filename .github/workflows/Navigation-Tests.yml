name: Navigation Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  list-navigation-files:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate matrix of Navigation test files
        id: set-matrix
        run: |
          files=$(find tests/Navigation -name '*.spec.js' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix={\"file\": $files}" >> $GITHUB_OUTPUT

  run-navigation-tests:
    needs: list-navigation-files
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.list-navigation-files.outputs.matrix) }}
    name: Run ${{ matrix.file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test
        continue-on-error: true
        run: npx playwright test ${{ matrix.file }}

      - name: Rename report folder
        if: always()
        id: sanitize
        run: |
          file="${{ matrix.file }}"
          safe_name=$(basename "$file" .spec.js | tr '/' '-' | tr '\\' '-' | tr '.' '-')
          echo "safe_name=$safe_name" >> $GITHUB_ENV
          mkdir -p renamed-reports/$safe_name
          if [ -d "playwright-report" ]; then
            cp -r playwright-report/* renamed-reports/$safe_name/
          else
            echo "playwright-report directory not found for $file"
          fi
          echo "Report stored in renamed-reports/$safe_name"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ env.safe_name }}
          path: renamed-reports/${{ env.safe_name }}
        continue-on-error: true
