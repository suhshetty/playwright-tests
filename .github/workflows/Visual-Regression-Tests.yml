name: Visual Regression Tests

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Get all .mjs visual test files
        id: get-files
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          find tests/VisualTesting -type f -name '*.mjs' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run each visual test and move its report
        run: |
          mkdir -p renamed-visual-reports
          while IFS= read -r file; do
            echo "Running: $file"
            basefile=$(basename "$file" .spec.mjs)
            npx playwright test "$file" || echo "Test failed for $file"
            if [ -d playwright-report ]; then
              mv playwright-report "renamed-visual-reports/${basefile}"
            else
              echo "No report generated for $file"
            fi
          done <<< "${{ steps.get-files.outputs.files }}"

      - name: Upload all visual reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-visual-reports
          path: renamed-visual-reports/
